services:
  api:
    build: .
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000
    env_file:
      - .env
    ports:
      - "8000:8000"
    volumes:
      - .:/app

  dashboard:
    build: .
    command: streamlit run dashboard/streamlit_app.py --server.address 0.0.0.0 --server.port 8501
    env_file:
      - .env
    ports:
      - "8501:8501"
    volumes:
      - .:/app
    depends_on:
      - api

